    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Foodie Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f8f9fa;
    }

    .navbar {
      background-color: #ff5722;
    }

    .navbar-brand, .nav-link {
      color: #fff !important;
      font-weight: 600;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover no-repeat;
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      background: rgba(0,0,0,0.5);
      padding: 15px;
      border-radius: 10px;
    }

    .card img {
      height: 200px;
      object-fit: cover;
    }

    .section-title {
      margin: 50px 0 20px;
      font-weight: bold;
      text-align: center;
    }

    footer {
      background: #222;
      color: #fff;
      padding: 20px;
      text-align: center;
      margin-top: 40px;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="#">🍔 Foodie Hub</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <h1>Delicious Food Delivered To Your Door</h1>
</section>

<div class="container">

  <!-- DESI FOOD -->
  <h2 class="section-title">🍛 Desi Food</h2>
  <div class="row">
    <!-- Repeat Card -->
    <!-- 7 Items -->
    <script>
      const desiFoods = [
        "Biryani","Karahi","Nihari","Haleem","Pulao","Chapli Kebab","Butter Chicken"
      ];
      const westernFoods = [
        "Pizza","Burger","Pasta","Sandwich","Steak","Fries","Hot Dog"
      ];
      const iceCreams = [
        "Vanilla","Chocolate","Strawberry","Mango","Kulfi","Oreo","Caramel"
      ];
      const drinks = [
        "Coke","Pepsi","Lassi","Juice","Milkshake","Coffee","Tea"
      ];

      function createSection(items, id) {
        let html = '';
        items.forEach(item => {
          html += `
          <div class="col-md-4 mb-4">
            <div class="card shadow">
              <img src="https://source.unsplash.com/400x300/?${item}" class="card-img-top">
              <div class="card-body text-center">
                <h5>${item}</h5>
                <button class="btn btn-warning">Order Now</button>
              </div>
            </div>
          </div>`;
        });
        document.getElementById(id).innerHTML = html;
      }
    </script>

    <div id="desi" class="row"></div>
  </div>

  <!-- WESTERN FOOD -->
  <h2 class="section-title">🍕 Western Food</h2>
  <div id="western" class="row"></div>

  <!-- ICE CREAM -->
  <h2 class="section-title">🍨 Ice Cream</h2>
  <div id="icecream" class="row"></div>

  <!-- DRINKS -->
  <h2 class="section-title">🥤 Drinks</h2>
  <div id="drinks" class="row"></div>

</div>

<!-- Footer -->
<footer>
  <p>© 2026 Foodie Hub | All Rights Reserved</p>
</footer>

<script>
  createSection(desiFoods, "desi");
  createSection(westernFoods, "western");
  createSection(iceCreams, "icecream");
  createSection(drinks, "drinks");
</script>
</body>
</html>
