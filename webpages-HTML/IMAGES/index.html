<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sehar's Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f8f9fa; font-family:Segoe UI; }

.navbar { background:#d62828; }
.navbar-brand { color:#fff !important; font-weight:bold; }

.hero {
  background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}

.hero h1 {
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:10px;
}

.card img {
  height:220px;
  object-fit:cover;
}

.section-title {
  text-align:center;
  margin:40px 0 20px;
  font-weight:bold;
}

.cart-box {
  position:fixed;
  right:20px;
  bottom:20px;
  width:260px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

footer {
  background:#222;
  color:#fff;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand">🍴 Sehar's Hub</span>
  </div>
</nav>

<div class="hero">
  <h1>Delicious Food, Delivered Fast</h1>
</div>

<div class="container">

<h2 class="section-title">Desi Food</h2>
<div class="row" id="desi"></div>

<h2 class="section-title">Western Food</h2>
<div class="row" id="western"></div>

<h2 class="section-title">Ice Cream</h2>
<div class="row" id="icecream"></div>

<h2 class="section-title">Drinks</h2>
<div class="row" id="drinks"></div>

</div>

<div class="cart-box">
  <h5>🛒 Cart</h5>
  <ul id="cartItems"></ul>
  <h6>Total: Rs <span id="total">0</span></h6>
</div>

<footer>© 2026 Sehar's Hub</footer>

<script>
let total = 0;

function addToCart(name, price){
  total += price;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - Rs " + price;
  document.getElementById("cartItems").appendChild(li);
}

function createItems(items, id){
  let html='';
  items.forEach(item=>{
    html+=`
    <div class="col-md-4 mb-4">
      <div class="card shadow">
        <img src="${item.img}">
        <div class="card-body text-center">
          <h5>${item.name}</h5>
          <p>Rs ${item.price}</p>
          <button class="btn btn-danger" onclick="addToCart('${item.name}', ${item.price})">Add</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById(id).innerHTML=html;
}

/* ✅ CORRECT MATCHED IMAGES */

createItems([
{name:"Biryani",price:300,img:"https://images.unsplash.com/photo-1589302168068-964664d93dc0"},
{name:"Karahi",price:800,img:"https://images.unsplash.com/photo-1603894584373-5ac82b2ae398"},
{name:"Nihari",price:500,img:"https://images.unsplash.com/photo-1601050690597-df0568f70950"},
{name:"Haleem",price:350,img:"https://images.unsplash.com/photo-1625944233249-7c7e0b86e9c4"},
{name:"Chapli Kebab",price:400,img:"https://images.unsplash.com/photo-1604908176997-125f25cc6f3d"}
],"desi");

createItems([
{name:"Pizza",price:900,img:"https://images.unsplash.com/photo-1548365328-5b849b1c7d59"},
{name:"Burger",price:500,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{name:"Pasta",price:600,img:"https://images.unsplash.com/photo-1521389508051-d7ffb5dc8c2e"},
{name:"Fries",price:250,img:"https://images.unsplash.com/photo-1541592106381-b31e9677c0e5"},
{name:"Hot Dog",price:350,img:"https://images.unsplash.com/photo-1550547660-8d1c9c4f4b6d"}
],"western");

createItems([
{name:"Vanilla Ice Cream",price:200,img:"https://images.unsplash.com/photo-1563805042-7684c019e1cb"},
{name:"Chocolate Ice Cream",price:220,img:"https://images.unsplash.com/photo-1570197788417-0e82375c9371"},
{name:"Strawberry Ice Cream",price:210,img:"https://images.unsplash.com/photo-1497032628192-86f99bcd76bc"},
{name:"Mango Ice Cream",price:230,img:"https://images.unsplash.com/photo-1627308595229-7830a5c91f9f"},
{name:"Kulfi",price:180,img:"https://images.unsplash.com/photo-1600891963935-c3f6c1f4fbd6"}
],"icecream");

createItems([
{name:"Coke",price:120,img:"https://images.unsplash.com/photo-1580910051074-3eb694886505"},
{name:"Pepsi",price:120,img:"https://images.unsplash.com/photo-1622483767028-3f66f2b3d7d3"},
{name:"Lassi",price:150,img:"https://images.unsplash.com/photo-1625944233249-7c7e0b86e9c4"},
{name:"Juice",price:180,img:"https://images.unsplash.com/photo-1572441710534-680a05b9cdd7"},
{name:"Coffee",price:200,img:"https://images.unsplash.com/photo-1509042239860-f550ce710b93"}
],"drinks");

</script>

</body>
</html>
