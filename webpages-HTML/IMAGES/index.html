<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sehar's Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f5f5f5; font-family:Segoe UI; }

.navbar { background:#d62828; }
.navbar-brand { color:#fff !important; font-size:22px; font-weight:bold; }

.hero {
  background:url('https://images.unsplash.com/photo-1504674900247-0877df9cc836') center/cover;
  height:60vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
}
.hero h1 {
  background:rgba(0,0,0,0.6);
  padding:15px 25px;
  border-radius:10px;
}

.card {
  border:none;
  border-radius:12px;
  overflow:hidden;
  transition:0.3s;
}
.card:hover { transform:scale(1.03); }

.card img {
  height:220px;
  object-fit:cover;
}

.section-title {
  text-align:center;
  margin:50px 0 25px;
  font-weight:bold;
}

.cart-box {
  position:fixed;
  right:20px;
  bottom:20px;
  width:260px;
  background:#fff;
  padding:15px;
  border-radius:12px;
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

footer {
  background:#222;
  color:#fff;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand">🍴 Sehar's Hub</span>
  </div>
</nav>

<div class="hero">
  <h1>Fresh & Delicious Food Delivered</h1>
</div>

<div class="container">

<h2 class="section-title">Desi Food</h2>
<div class="row" id="desi"></div>

<h2 class="section-title">Western Food</h2>
<div class="row" id="western"></div>

<h2 class="section-title">Ice Cream</h2>
<div class="row" id="icecream"></div>

<h2 class="section-title">Drinks</h2>
<div class="row" id="drinks"></div>

</div>

<div class="cart-box">
  <h5>🛒 Cart</h5>
  <ul id="cartItems"></ul>
  <h6>Total: Rs <span id="total">0</span></h6>
</div>

<footer>© 2026 Sehar's Hub</footer>

<script>
let total = 0;

function addToCart(name, price){
  total += price;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - Rs " + price;
  document.getElementById("cartItems").appendChild(li);
}

function createItems(items, id){
  let html='';
  items.forEach(item=>{
    html+=`
    <div class="col-md-4 mb-4">
      <div class="card shadow">
        <img src="${item.img}">
        <div class="card-body text-center">
          <h5>${item.name}</h5>
          <p>Rs ${item.price}</p>
          <button class="btn btn-danger" onclick="addToCart('${item.name}', ${item.price})">Add</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById(id).innerHTML=html;
}

/* CORRECTED IMAGES */
createItems([
{name:"Biryani",price:300,img:"https://upload.wikimedia.org/wikipedia/commons/7/7c/Chicken_Biryani.jpg"},
{name:"Karahi",price:800,img:"https://upload.wikimedia.org/wikipedia/commons/3/3b/Chicken_Karahi.jpg"},

{name:"Pulao",price:250,img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/Pulao.jpg"},
{name:"Chapli Kebab",price:400,img:"https://upload.wikimedia.org/wikipedia/commons/f/f4/Chapli_Kebab.jpg"},
{name:"Butter Chicken",price:700,img:"https://upload.wikimedia.org/wikipedia/commons/3/3f/Butter_Chicken.jpg"}
],"desi");

createItems([
{name:"Pizza",price:900,img:"https://upload.wikimedia.org/wikipedia/commons/d/d3/Supreme_pizza.jpg"},
{name:"Burger",price:500,img:"https://upload.wikimedia.org/wikipedia/commons/4/4f/Hamburger_%28black_bg%29.jpg"},
{name:"Pasta",price:600,img:"https://upload.wikimedia.org/wikipedia/commons/0/0b/RedPasta.jpg"},
{name:"Sandwich",price:300,img:"https://upload.wikimedia.org/wikipedia/commons/c/c4/Sandwich.jpg"},

],"western");

{name:"Chocolate",price:220,img:"https://upload.wikimedia.org/wikipedia/commons/7/70/Chocolate_ice_cream.jpg"},
{name:"Strawberry",price:210,img:"https://upload.wikimedia.org/wikipedia/commons/2/29/Strawberry_ice_cream.jpg"},

{name:"Caramel",price:250,img:"https://upload.wikimedia.org/wikipedia/commons/4/4c/Caramel_ice_cream.jpg"}

],"drinks");

</script>
</body>
</html>
