<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Meal Planner</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: #f1f5f9;
}

/* Hero Section */
.hero {
    height: 300px;
    background: url('https://images.unsplash.com/photo-1490645935967-10de6ba17061') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    text-align: center;
}
.hero h1 {
    background: rgba(0,0,0,0.5);
    padding: 15px 30px;
    border-radius: 10px;
}

/* Glass Card */
.glass {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

/* Meal Card */
.meal-card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

.meal-card:hover {
    transform: scale(1.02);
    transition: 0.3s;
}

.btn-custom {
    border-radius: 10px;
}

</style>
</head>

<body>

<!-- Hero -->
<div class="hero">
    <h1>🍽 Smart Daily Meal Planner</h1>
</div>

<div class="container mt-5">

    <!-- Add Meal -->
    <div class="glass p-4 mb-4">
        <h4><i class="bi bi-plus-circle"></i> Add Meal</h4>
        <div class="row g-2">
            <div class="col-md-3">
                <input type="text" id="mealName" class="form-control" placeholder="Meal Name">
            </div>
            <div class="col-md-2">
                <select id="mealType" class="form-control">
                    <option>Breakfast</option>
                    <option>Lunch</option>
                    <option>Dinner</option>
                    <option>Snack</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" id="calories" class="form-control" placeholder="Calories">
            </div>
            <div class="col-md-3">
                <input type="date" id="mealDate" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-success w-100 btn-custom" onclick="addMeal()">Add</button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-4" placeholder="🔍 Search meals..." onkeyup="searchMeals()">

    <!-- Meals -->
    <div class="row" id="mealList"></div>

    <!-- Calories -->
    <div class="glass p-3 mt-4 text-center">
        <h4>Total Calories: <span id="totalCalories">0</span> kcal</h4>
    </div>

</div>

<script>
let meals = JSON.parse(localStorage.getItem("meals")) || [];

const images = {
    Breakfast: "https://images.unsplash.com/photo-1504754524776-8f4f37790ca0",
    Lunch: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c",
    Dinner: "https://images.unsplash.com/photo-1604908177522-402c9cba2b6f",
    Snack: "https://images.unsplash.com/photo-1499636136210-6f4ee915583e"
};

function saveData() {
    localStorage.setItem("meals", JSON.stringify(meals));
}

function addMeal() {
    let name = document.getElementById("mealName").value;
    let type = document.getElementById("mealType").value;
    let calories = document.getElementById("calories").value;
    let date = document.getElementById("mealDate").value;

    if(name === "" || calories === "" || date === "") {
        alert("Fill all fields!");
        return;
    }

    meals.push({name, type, calories: parseInt(calories), date});
    saveData();
    displayMeals();
}

function deleteMeal(index) {
    meals.splice(index, 1);
    saveData();
    displayMeals();
}

function displayMeals(filtered = meals) {
    let list = document.getElementById("mealList");
    list.innerHTML = "";
    let total = 0;

    filtered.forEach((meal, index) => {
        total += meal.calories;

        list.innerHTML += `
        <div class="col-md-4 mb-4">
            <div class="glass p-3 meal-card">
                <img src="${images[meal.type]}" alt="meal">
                <h5 class="mt-2">${meal.name}</h5>
                <p><b>${meal.type}</b> | ${meal.date}</p>
                <p>🔥 ${meal.calories} kcal</p>
                <button class="btn btn-danger btn-sm" onclick="deleteMeal(${index})">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </div>
        </div>
        `;
    });

    document.getElementById("totalCalories").innerText = total;
}

function searchMeals() {
    let query = document.getElementById("search").value.toLowerCase();
    let filtered = meals.filter(meal => meal.name.toLowerCase().includes(query));
    displayMeals(filtered);
}

displayMeals();
</script>

</body>
</html>


</body>
</html>
