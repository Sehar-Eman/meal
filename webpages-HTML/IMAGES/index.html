    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Meal Planner</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            border-radius: 15px;
        }
        .meal-type {
            font-weight: bold;
            color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">🍽 Daily Meal Planner</h2>

    <!-- Add Meal Form -->
    <div class="card p-4 mb-4">
        <h5>Add Meal</h5>
        <div class="row">
            <div class="col-md-3">
                <input type="text" id="mealName" class="form-control" placeholder="Meal Name">
            </div>
            <div class="col-md-2">
                <select id="mealType" class="form-control">
                    <option>Breakfast</option>
                    <option>Lunch</option>
                    <option>Dinner</option>
                    <option>Snack</option>
                </select>
            </div>
            <div class="col-md-2">
                <input type="number" id="calories" class="form-control" placeholder="Calories">
            </div>
            <div class="col-md-3">
                <input type="date" id="mealDate" class="form-control">
            </div>
            <div class="col-md-2">
                <button class="btn btn-primary w-100" onclick="addMeal()">Add</button>
            </div>
        </div>
    </div>

    <!-- Search -->
    <input type="text" id="search" class="form-control mb-3" placeholder="Search meals..." onkeyup="searchMeals()">

    <!-- Meal List -->
    <div id="mealList"></div>

    <!-- Total Calories -->
    <div class="card p-3 mt-3">
        <h5>Total Calories: <span id="totalCalories">0</span></h5>
    </div>
</div>

<script>
let meals = JSON.parse(localStorage.getItem("meals")) || [];

function saveData() {
    localStorage.setItem("meals", JSON.stringify(meals));
}

function addMeal() {
    let name = document.getElementById("mealName").value;
    let type = document.getElementById("mealType").value;
    let calories = document.getElementById("calories").value;
    let date = document.getElementById("mealDate").value;

    if(name === "" || calories === "" || date === "") {
        alert("Please fill all fields");
        return;
    }

    meals.push({name, type, calories: parseInt(calories), date});
    saveData();
    displayMeals();
}

function deleteMeal(index) {
    meals.splice(index, 1);
    saveData();
    displayMeals();
}

function displayMeals(filtered = meals) {
    let list = document.getElementById("mealList");
    list.innerHTML = "";
    let total = 0;

    filtered.forEach((meal, index) => {
        total += meal.calories;

        list.innerHTML += `
        <div class="card p-3 mb-2">
            <div class="d-flex justify-content-between">
                <div>
                    <h5>${meal.name}</h5>
                    <p class="meal-type">${meal.type}</p>
                    <p>${meal.date}</p>
                    <p>Calories: ${meal.calories}</p>
                </div>
                <button class="btn btn-danger" onclick="deleteMeal(${index})">Delete</button>
            </div>
        </div>
        `;
    });

    document.getElementById("totalCalories").innerText = total;
}

function searchMeals() {
    let query = document.getElementById("search").value.toLowerCase();
    let filtered = meals.filter(meal => meal.name.toLowerCase().includes(query));
    displayMeals(filtered);
}

displayMeals();
</script>

</body>
</html>

</body>
</html>
