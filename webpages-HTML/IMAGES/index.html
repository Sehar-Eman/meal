<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sehar's Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background:#f4f4f4; font-family:Segoe UI; }

.navbar { background:#c1121f; }
.navbar-brand { color:#fff !important; font-weight:bold; font-size:22px; }

.hero {
  background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
  url('https://picsum.photos/1200/600?food');
  height:60vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#fff;
}

.hero h1 { font-size:2.5rem; }

.card img {
  height:220px;
  object-fit:cover;
}

.section-title {
  text-align:center;
  margin:50px 0 20px;
  font-weight:bold;
}

.cart-box {
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.2);
}

footer {
  background:#222;
  color:#fff;
  text-align:center;
  padding:15px;
  margin-top:40px;
}
</style>
</head>

<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand">🍴 Sehar's Hub</span>
  </div>
</nav>

<div class="hero">
  <h1>Order Fresh & Tasty Food</h1>
</div>

<div class="container">

<h2 class="section-title">Desi Food</h2>
<div class="row" id="desi"></div>

<h2 class="section-title">Western Food</h2>
<div class="row" id="western"></div>

<h2 class="section-title">Ice Cream</h2>
<div class="row" id="icecream"></div>

<h2 class="section-title">Drinks</h2>
<div class="row" id="drinks"></div>

</div>

<div class="cart-box">
  <h5>🛒 Cart</h5>
  <ul id="cartItems"></ul>
  <h6>Total: Rs <span id="total">0</span></h6>
</div>

<footer>© 2026 Sehar's Hub</footer>

<script>
let total = 0;

function addToCart(name, price){
  total += price;
  document.getElementById("total").innerText = total;

  let li = document.createElement("li");
  li.innerText = name + " - Rs " + price;
  document.getElementById("cartItems").appendChild(li);
}

function createItems(items, id){
  let html='';
  items.forEach(item=>{
    html+=`
    <div class="col-md-4 mb-4">
      <div class="card shadow">
        <img src="${item.img}" onerror="this.src='https://picsum.photos/400/300?random'">
        <div class="card-body text-center">
          <h5>${item.name}</h5>
          <p>Rs ${item.price}</p>
          <button class="btn btn-danger" onclick="addToCart('${item.name}', ${item.price})">Add</button>
        </div>
      </div>
    </div>`;
  });
  document.getElementById(id).innerHTML=html;
}

/* RELIABLE IMAGE LINKS */
createItems([
{name:"Biryani",price:300,img:"https://picsum.photos/400/300?biryani"},
{name:"Karahi",price:800,img:"https://picsum.photos/400/300?curry"},
{name:"Nihari",price:500,img:"https://picsum.photos/400/300?beef"},
{name:"Haleem",price:350,img:"https://picsum.photos/400/300?stew"},
{name:"Pulao",price:250,img:"https://picsum.photos/400/300?rice"},
{name:"Chapli Kebab",price:400,img:"https://picsum.photos/400/300?kebab"},
{name:"Butter Chicken",price:700,img:"https://picsum.photos/400/300?chicken"}
],"desi");

createItems([
{name:"Pizza",price:900,img:"https://picsum.photos/400/300?pizza"},
{name:"Burger",price:500,img:"https://picsum.photos/400/300?burger"},
{name:"Pasta",price:600,img:"https://picsum.photos/400/300?pasta"},
{name:"Sandwich",price:300,img:"https://picsum.photos/400/300?sandwich"},
{name:"Steak",price:1500,img:"https://picsum.photos/400/300?steak"},
{name:"Fries",price:250,img:"https://picsum.photos/400/300?fries"},
{name:"Hot Dog",price:350,img:"https://picsum.photos/400/300?hotdog"}
],"western");

createItems([
{name:"Vanilla Ice Cream",price:200,img:"https://picsum.photos/400/300?icecream"},
{name:"Chocolate Ice Cream",price:220,img:"https://picsum.photos/400/300?chocolate"},
{name:"Strawberry Ice Cream",price:210,img:"https://picsum.photos/400/300?strawberry"},
{name:"Mango Ice Cream",price:230,img:"https://picsum.photos/400/300?mango"},
{name:"Kulfi",price:180,img:"https://picsum.photos/400/300?dessert"},
{name:"Oreo Ice Cream",price:240,img:"https://picsum.photos/400/300?oreo"},
{name:"Caramel Ice Cream",price:250,img:"https://picsum.photos/400/300?caramel"}
],"icecream");

createItems([
{name:"Coke",price:120,img:"https://picsum.photos/400/300?cola"},
{name:"Pepsi",price:120,img:"https://picsum.photos/400/300?soda"},
{name:"Lassi",price:150,img:"https://picsum.photos/400/300?lassi"},
{name:"Juice",price:180,img:"https://picsum.photos/400/300?juice"},
{name:"Milkshake",price:220,img:"https://picsum.photos/400/300?milkshake"},
{name:"Coffee",price:200,img:"https://picsum.photos/400/300?coffee"},
{name:"Tea",price:100,img:"https://picsum.photos/400/300?tea"}
],"drinks");

</script>
</body>
</html>
